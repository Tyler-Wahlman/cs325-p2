name: Python CI


# Look at the directory structure in the readme file
# This file should be inside .github/workflows
# This file gives directions to GitHub Actions on what and how to run the
# CI pipeline

# "on" a push to the branch main this CI pipeline will start
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


# We will run the test cases inside of a container which will be inside of another
# machine inside of Github. The runs-on parameter given below is the OS of the environment
# where your container will run. GitHub will automatically pull your container from Docker Hub

jobs:
  test-in-container:
    runs-on: ubuntu-latest
    container:
      image: twahlma/cs325-rag
      # all dependencies (pytest) are already in this docker image hosted as public image in YOUR Docker Hub account

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run tests in container
        run: pytest tests/test_rag.py -v
